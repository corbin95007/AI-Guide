<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Engineer 上车</title>
    <link rel="preconnect" href="https://fonts.googleapis.cn">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.cn/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- CSS 按职责拆分 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-theme="default">
    <canvas id="bg-canvas"></canvas>

    <div id="app">
        <!-- 左侧导航栏 -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="brand-text">
                    <div class="brand-title">AI Engineer 上车！</div>
                    <div class="brand-subtitle">这就是这个时代的风口吗，怎么抓不住啊...</div>
                </div>
            </div>
            <nav class="sidebar-nav" id="sidebarNav">
                <!-- 由 JS 根据 config/nav.js 动态生成 -->
            </nav>
            <div class="theme-switcher-container">
                <button id="themeSwitcher" class="theme-btn" title="点击切换视觉风格">
                    <span class="theme-icon" id="themeIcon">✨</span>
                    <span class="theme-text" id="themeText">默认模式</span>
                </button>
            </div>
        </aside>

        <!-- 桌面端内容区（由 ContentRenderer 动态填充） -->
        <div id="desktop-panels"></div>

        <!-- 移动端（由 ContentRenderer 动态填充） -->
        <div class="mobile-only">
            <header class="mobile-header">
                <div class="mobile-header-content">
                    <div class="logo-text">AI Engineer 上车！</div>
                    <button class="menu-toggle" id="mobileMenuToggle" aria-label="菜单">
                        <span></span>
                        <span></span>
                        <span></span>
                    </button>
                </div>
            </header>
            <main class="mobile-main-content">
                <div id="mobile-panels"></div>
            </main>
        </div>
    </div>

    <!-- JS 按功能拆分，顺序：数据 → 引擎 → 渲染 → 交互 → 启动 -->
    <script src="config/nav.js"></script>
    <script src="config/content-tab1.js"></script>
    <script src="config/content-tab2.js"></script>
    <script src="config/content-tab3.js"></script>
    <script src="config/content-tab4.js"></script>
    <script src="config/content-tab5.js"></script>
    <script src="config/content-tab6.js"></script>
    <script src="config/content.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/tabs.js"></script>
    <script src="js/toc.js"></script>
    <script src="js/mobile-menu.js"></script>
    <script src="js/content-renderer.js"></script>
    <script src="js/app.js"></script>

    <!-- 导航栏动态生成脚本（必须在 nav.js 加载后执行） -->
    <script>
        (function() {
            var nav = document.getElementById('sidebarNav');
            if (!nav || typeof NAV_CONFIG === 'undefined') return;
            NAV_CONFIG.forEach(function(item, index) {
                var btn = document.createElement('button');
                btn.className = 'nav-item' + (index === 0 ? ' active' : '');
                btn.dataset.tab = item.id;
                btn.innerHTML = '<span class="nav-text">' + item.label + '</span>';
                nav.appendChild(btn);
            });
        })();
    </script>
</body>
</html>
